<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Memoria</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; width: 300px; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 8px 0; color: #333; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; border: 0; border-radius: 6px; background: #2a6df4; color: white; }
    button:hover { background: #1f56c0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin-top: 10px; font-size: 12px; color: #555; min-height: 1.4em; word-break: break-all; }
    .ok { color: #2a7; }
    .err { color: #c33; }
    .open-ui { display: block; margin-top: 8px; font-size: 11px; color: #2a6df4; text-decoration: none; text-align: center; }
    .open-ui:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Memoria Bookmarker</h1>
  <button id="save">このページを保存</button>
  <div id="status"></div>
  <a class="open-ui" id="openUi" href="#" target="_blank">Memoria を開く</a>
  <script src="popup.js"></script>
</body>
</html>
