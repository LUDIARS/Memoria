name: Desktop Release

# Builds the Electron desktop app on each tagged release and publishes a
# zipped installer per platform to the GitHub Release.
#
# Trigger:
#   - Push a tag matching v* (e.g. `git tag v0.1.0 && git push --tags`)
#   - Or run "Run workflow" manually (workflow_dispatch) on any branch.
#
# Outputs (per platform, attached to the Release):
#   Memoria-<version>-windows-x64.zip   # NSIS installer
#   Memoria-<version>-macos-arm64.zip   # dmg
#   Memoria-<version>-linux-x64.zip     # AppImage + deb

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to (e.g. v0.1.0). Created if missing.'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            bundle_target: win-x64
            builder_flag: --win
            installer_glob: 'desktop/dist/*Setup*.exe'
            extra_glob:    ''
          - os: macos-14
            label: macos-arm64
            bundle_target: darwin-arm64
            builder_flag: --mac
            installer_glob: 'desktop/dist/*.dmg'
            extra_glob:    ''
          - os: ubuntu-latest
            label: linux-x64
            bundle_target: linux-x64
            builder_flag: --linux
            installer_glob: 'desktop/dist/*.AppImage'
            extra_glob:    'desktop/dist/*.deb'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund

      - name: Typecheck
        working-directory: desktop
        run: npm run typecheck

      - name: Compile TypeScript
        working-directory: desktop
        run: npm run build:ts

      - name: Generate placeholder icons
        working-directory: desktop
        run: npx --no-install tsx scripts/generate-icons.ts

      - name: Bundle Memoria server + Node runtime
        working-directory: desktop
        run: npx --no-install tsx scripts/bundle-server.ts --node-version=22.11.0 --platform=${{ matrix.bundle_target }}

      - name: Build Electron installer
        working-directory: desktop
        env:
          # electron-builder picks up GH_TOKEN to publish, but we attach
          # artefacts ourselves via gh release upload — leave it unset so
          # the build step doesn't try to publish twice. Disable the macOS
          # codesign auto-discovery in unsigned CI builds.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx --no-install electron-builder ${{ matrix.builder_flag }} --publish=never

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage + zip artefacts
        shell: bash
        run: |
          set -e
          mkdir -p release-staging release-out
          shopt -s nullglob
          for f in ${{ matrix.installer_glob }} ${{ matrix.extra_glob }}; do
            cp "$f" release-staging/
          done
          ls -la release-staging
          if [ -z "$(ls -A release-staging)" ]; then
            echo "::error::no installer artefacts matched the configured globs"
            exit 1
          fi
          tag="${{ steps.tag.outputs.tag }}"
          zip_name="Memoria-${tag}-${{ matrix.label }}.zip"
          (cd release-staging && \
            if command -v 7z >/dev/null 2>&1; then \
              7z a -tzip "../release-out/${zip_name}" ./* >/dev/null; \
            else \
              zip -r "../release-out/${zip_name}" ./*; \
            fi)
          ls -la release-out

      - uses: actions/upload-artifact@v4
        with:
          name: memoria-desktop-${{ matrix.label }}
          path: release-out/*.zip
          retention-days: 14

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -la dist

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.zip \
              --title "Memoria $tag" \
              --notes "Desktop installers (zipped) for Windows / macOS / Linux. See README.md and desktop/README.md for setup."
          fi
