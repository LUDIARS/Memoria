name: Desktop Release

# Builds the Tauri desktop app on each tagged release and publishes a zipped
# installer per platform to the GitHub Release.
#
# Trigger:
#   - Push a tag matching v* (e.g. `git tag v0.1.0 && git push --tags`)
#   - Or run "Run workflow" manually (workflow_dispatch) on any branch.
#
# Outputs (per platform, attached to the Release):
#   Memoria-<version>-windows-x64.zip   # NSIS exe installer
#   Memoria-<version>-macos-arm64.zip   # dmg
#   Memoria-<version>-linux-x64.zip     # AppImage + deb

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to (e.g. v0.1.0). Created if missing.'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            bundle_glob: 'desktop/src-tauri/target/release/bundle/nsis/*-setup.exe'
            extra_glob:  ''
          - os: macos-14
            label: macos-arm64
            bundle_glob: 'desktop/src-tauri/target/release/bundle/dmg/*.dmg'
            extra_glob:  ''
          - os: ubuntu-latest
            label: linux-x64
            bundle_glob: 'desktop/src-tauri/target/release/bundle/appimage/*.AppImage'
            extra_glob:  'desktop/src-tauri/target/release/bundle/deb/*.deb'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Bundle Memoria server + Node runtime
        working-directory: desktop
        run: node scripts/bundle-server.mjs --node-version=22.11.0

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build desktop app
        working-directory: desktop
        env:
          # Skip the beforeBuildCommand re-run; we just bundled.
          TAURI_SKIP_DEVSERVER_CHECK: '1'
        run: cargo tauri build

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage + zip artefacts
        shell: bash
        run: |
          set -e
          mkdir -p release-staging release-out
          # Collect every match into release-staging/.
          shopt -s nullglob
          for f in ${{ matrix.bundle_glob }} ${{ matrix.extra_glob }}; do
            cp "$f" release-staging/
          done
          ls -la release-staging
          if [ -z "$(ls -A release-staging)" ]; then
            echo "::error::no installer artefacts matched the configured globs"
            exit 1
          fi
          tag="${{ steps.tag.outputs.tag }}"
          zip_name="Memoria-${tag}-${{ matrix.label }}.zip"
          # Zip from inside release-staging so the archive is flat.
          (cd release-staging && \
            if command -v 7z >/dev/null 2>&1; then \
              7z a -tzip "../release-out/${zip_name}" ./* >/dev/null; \
            else \
              zip -r "../release-out/${zip_name}" ./*; \
            fi)
          ls -la release-out

      - uses: actions/upload-artifact@v4
        with:
          name: memoria-desktop-${{ matrix.label }}
          path: release-out/*.zip
          retention-days: 14

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artefacts
        run: ls -la dist

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # workflow_dispatch needs the tag created before we can attach to it.
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$tag"
            git push origin "$tag"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.zip --clobber
          else
            gh release create "$tag" dist/*.zip \
              --title "Memoria $tag" \
              --notes "Desktop installers (zipped) for Windows / macOS / Linux. See README.md and desktop/README.md for setup."
          fi
