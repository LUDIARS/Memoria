name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: service/package-lock.json

      - name: Install service deps
        working-directory: service
        env:
          # Optional: pull @ludiars/* from GitHub Packages if NPM_TOKEN is set.
          # CI works without it; the SDK is in optionalDependencies and
          # `npm install` (rather than `ci`) silently skips optional packages
          # whose registry rejects the missing auth. We avoid `--omit=optional`
          # because rollup (used by vitest) ships platform-specific binaries
          # via optionalDependencies — stripping those breaks the test runner.
          NPM_TOKEN: ${{ secrets.LUDIARS_NPM_TOKEN || '' }}
        run: npm install --no-audit --no-fund

      - name: Install mcp-server deps
        working-directory: mcp-server
        run: npm ci

      - name: Syntax check (service)
        run: |
          set -e
          while IFS= read -r f; do
            node --check "$f"
          done < <(find service -type f -name '*.js' -not -path 'service/node_modules/*')

      - name: Syntax check (mcp-server)
        run: |
          set -e
          while IFS= read -r f; do
            node --check "$f"
          done < <(find mcp-server -type f -name '*.js' -not -path 'mcp-server/node_modules/*')

      - name: Syntax check (extension)
        run: |
          set -e
          while IFS= read -r f; do
            node --check "$f"
          done < <(find extension -type f -name '*.js')

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./extension/manifest.json');
            if (m.manifest_version !== 3) { throw new Error('manifest_version must be 3'); }
            if (!Array.isArray(m.permissions)) { throw new Error('permissions[] required'); }
            if (!m.background?.service_worker) { throw new Error('background.service_worker required'); }
            console.log('manifest ok, version', m.version);
          "

      - name: Run service unit/integration tests (vitest)
        working-directory: service
        run: npm test

      - name: Mock claude CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/claude" <<'EOF'
          #!/usr/bin/env bash
          # CI mock: ignore prompt and emit deterministic JSON.
          cat <<'JSON'
          {"summary":"ci mock summary","categories":["ci","test"]}
          JSON
          EOF
          chmod +x "$HOME/.local/bin/claude"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Smoke test (service boots + handles a bookmark)
        working-directory: service
        env:
          MEMORIA_PORT: '15180'
          MEMORIA_DATA: /tmp/memoria-ci
          MEMORIA_RAG: '0'
        run: |
          set -e
          rm -rf /tmp/memoria-ci
          node index.js &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          # Wait for the service to be ready (max 15s).
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:$MEMORIA_PORT/api/queue" > /dev/null 2>&1; then
              break
            fi
            sleep 0.5
          done
          curl -fsS "http://localhost:$MEMORIA_PORT/api/bookmarks"
          echo
          curl -fsS "http://localhost:$MEMORIA_PORT/api/categories"
          echo
          curl -fsS "http://localhost:$MEMORIA_PORT/api/queue"
          echo

          # Save a bookmark; mock claude returns instantly.
          curl -fsS -X POST "http://localhost:$MEMORIA_PORT/api/bookmark" \
            -H 'Content-Type: application/json' \
            -d '{"url":"https://example.com/ci","title":"CI","html":"<html><body>hi</body></html>"}'
          echo

          # Wait for the queue to drain.
          for i in $(seq 1 20); do
            depth=$(curl -fsS "http://localhost:$MEMORIA_PORT/api/queue" | node -e 'let s=""; process.stdin.on("data",d=>s+=d); process.stdin.on("end",()=>console.log(JSON.parse(s).depth))')
            if [ "$depth" = "0" ]; then break; fi
            sleep 0.5
          done

          # Result should be done with the mock-supplied summary.
          curl -fsS "http://localhost:$MEMORIA_PORT/api/bookmarks/1"
          echo

          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true

      - name: Smoke test (online mode — read public, write 401, /api/bookmark 410)
        working-directory: service
        env:
          MEMORIA_PORT: '15181'
          MEMORIA_DATA: /tmp/memoria-online-ci
          MEMORIA_RAG: '0'
          MEMORIA_MODE: online
          MEMORIA_JWT_SECRET: ci-test-secret-please-change
        run: |
          set -e
          rm -rf /tmp/memoria-online-ci
          node index.js &
          PID=$!
          trap 'kill $PID 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            if curl -fsS "http://localhost:$MEMORIA_PORT/api/mode" > /dev/null 2>&1; then break; fi
            sleep 0.5
          done

          echo '--- /api/mode (anonymous): expect mode=online, caps=[read] ---'
          curl -fsS "http://localhost:$MEMORIA_PORT/api/mode"
          echo
          curl -fsS "http://localhost:$MEMORIA_PORT/api/mode" | node -e '
            let s=""; process.stdin.on("data",d=>s+=d); process.stdin.on("end",()=>{
              const r = JSON.parse(s);
              if (r.mode !== "online") throw new Error("expected mode=online, got " + r.mode);
              if (r.authenticated) throw new Error("anonymous request should not be authenticated");
              if (!Array.isArray(r.caps) || !r.caps.includes("read")) throw new Error("caps should include read");
              if (r.caps.includes("write")) throw new Error("anonymous caps should not include write");
              console.log("mode endpoint OK");
            });'

          echo '--- GET /api/bookmarks: expect 200 (public) ---'
          test "$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:$MEMORIA_PORT/api/bookmarks")" = '200'

          echo '--- POST /api/bookmark without auth: expect 410 (disabled in online) ---'
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST "http://localhost:$MEMORIA_PORT/api/bookmark" \
            -H 'Content-Type: application/json' \
            -d '{"url":"https://example.com/x","title":"x","html":"<html></html>"}')" = '410'

          echo '--- PATCH /api/bookmarks/1 without auth: expect 401 ---'
          test "$(curl -s -o /dev/null -w '%{http_code}' -X PATCH "http://localhost:$MEMORIA_PORT/api/bookmarks/1" \
            -H 'Content-Type: application/json' -d '{"memo":"x"}')" = '401'

          echo '--- GET /api/visits/unsaved: expect 403 (online disabled) ---'
          test "$(curl -s -o /dev/null -w '%{http_code}' "http://localhost:$MEMORIA_PORT/api/visits/unsaved")" = '403'

          echo '--- issue dev token, /api/mode with auth: expect caps include write ---'
          TOKEN=$(MEMORIA_JWT_SECRET=ci-test-secret-please-change npm run --silent issue-token alice | tail -1)
          curl -fsS -H "Authorization: Bearer $TOKEN" "http://localhost:$MEMORIA_PORT/api/mode" | node -e '
            let s=""; process.stdin.on("data",d=>s+=d); process.stdin.on("end",()=>{
              const r = JSON.parse(s);
              if (r.user_id !== "alice") throw new Error("expected user_id=alice, got " + r.user_id);
              if (!r.caps.includes("write")) throw new Error("authed caps should include write");
              console.log("authed mode OK");
            });'

          kill $PID 2>/dev/null || true
          wait $PID 2>/dev/null || true
